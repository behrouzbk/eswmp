# ============================================================
# ESWMP — Docker Compose Override (local development)
# Overrides the base docker-compose.yml for local dev:
#   - Services run with Development environment
#   - RabbitMQ + Jaeger point to local Docker containers
# ============================================================

services:

  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-YourStrong@Passw0rd}

  gateway:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Otel__ServiceName: Eswmp.Gateway
      Otel__Endpoint: http://jaeger:4317

  core:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: ${CORE_DB:-Host=postgres;Port=5432;Database=eswmp_core;Username=eswmp;Password=YourStrong@Passw0rd}
      MessageBus__Transport: RabbitMQ
      MessageBus__Host: rabbitmq
      MessageBus__Port: 5672
      MessageBus__Username: guest
      MessageBus__Password: guest
      Otel__ServiceName: Eswmp.Core
      Otel__Endpoint: http://jaeger:4317

  assignment:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: ${ASSIGNMENT_DB:-Host=postgres;Port=5432;Database=eswmp_assignment;Username=eswmp;Password=YourStrong@Passw0rd}
      MessageBus__Transport: RabbitMQ
      MessageBus__Host: rabbitmq
      MessageBus__Port: 5672
      MessageBus__Username: guest
      MessageBus__Password: guest
      Otel__ServiceName: Eswmp.Assignment
      Otel__Endpoint: http://jaeger:4317

  rules:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: ${RULES_DB:-Host=postgres;Port=5432;Database=eswmp_rules;Username=eswmp;Password=YourStrong@Passw0rd}
      MessageBus__Transport: RabbitMQ
      MessageBus__Host: rabbitmq
      MessageBus__Port: 5672
      MessageBus__Username: guest
      MessageBus__Password: guest
      Otel__ServiceName: Eswmp.Rules
      Otel__Endpoint: http://jaeger:4317

  work:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: ${WORK_DB:-Host=postgres;Port=5432;Database=eswmp_work;Username=eswmp;Password=YourStrong@Passw0rd}
      MessageBus__Transport: RabbitMQ
      MessageBus__Host: rabbitmq
      MessageBus__Port: 5672
      MessageBus__Username: guest
      MessageBus__Password: guest
      Otel__ServiceName: Eswmp.Work
      Otel__Endpoint: http://jaeger:4317
