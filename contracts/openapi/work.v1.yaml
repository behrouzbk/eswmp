openapi: 3.1.0
info:
  title: ESWMP Work API
  version: v1
  description: |
    Demand Intake and Work Requirement modules (docs/api "Demand Intake #01",
    "Work Requirement #02"). Demand Intake receives raw units of work from a
    caller's own domain via an opaque externalReferenceType/externalReferenceId
    pair and carries them through a validate/accept/reject/cancel lifecycle.
    Work Requirement defines the versioned, immutable-once-active "what kind of
    work this is" shape (resource/capability/skill/certification needs,
    duration, location constraints) that a Demand can be matched against.
    This service never stores or returns any data belonging to the caller's
    own domain beyond the opaque reference pair — see CLAUDE.md rule 1.
servers:
  - url: http://localhost:6004
    description: Local development
security:
  - BearerAuth: []

paths:
  /api/v1/demands:
    post:
      tags: [Demands]
      summary: Submit a Demand
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
          description: >
            Replays the original response if the same key is sent again with the
            same effective request body; returns 409 if the same key is sent with
            a different body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDemandRequest'
      responses:
        '201':
          description: Demand created (or the original response, replayed for a repeated idempotency key)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Demand'
        '400':
          description: Missing Idempotency-Key header, or the request failed validation (code=VALIDATION_FAILED)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: Idempotency-Key reused with a different request body (code=IDEMPOTENCY_CONFLICT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/v1/demands/search:
    post:
      tags: [Demands]
      summary: Paged search over Demands
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemandSearchRequest'
      responses:
        '200':
          description: Paged demand list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedDemandResult'

  /api/v1/demands/{id}:
    get:
      tags: [Demands]
      summary: Get a single Demand
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Demand detail (v2 delta — now includes externalStatus)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandWithExternalStatus'
        '404':
          description: Not found (code=NOT_FOUND)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    patch:
      tags: [Demands]
      summary: >
        Update mutable Demand fields. Mutability depends on status: Received/
        Validating are broadly mutable, Ready is restricted to Priority only,
        Accepted/Rejected/Cancelled/Expired are immutable.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDemandRequest'
      responses:
        '200':
          description: Updated Demand
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Demand'
        '409':
          description: Field not mutable in the Demand's current status (code=STATUS_CONFLICT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '412':
          description: expectedVersion did not match the Demand's current version (code=VERSION_CONFLICT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/v1/demands/{id}/validate:
    post:
      tags: [Demands]
      summary: Run validation and transition Received/Validating -> Ready (or stay Received if Invalid)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemandValidationResult'
        '409':
          description: Demand is in a terminal status (code=STATUS_CONFLICT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/v1/demands/{id}/accept:
    post:
      tags: [Demands]
      summary: Accept a Ready Demand. Requires demand.transition.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Accepted Demand
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Demand'
        '409':
          description: Demand is not Ready (code=STATUS_CONFLICT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/v1/demands/{id}/reject:
    post:
      tags: [Demands]
      summary: Reject a Demand (reasonCode is mandatory). Requires demand.transition.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectDemandRequest'
      responses:
        '200':
          description: Rejected Demand
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Demand'
        '400':
          description: reasonCode missing (code=VALIDATION_FAILED)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: Demand already in an immutable status (code=STATUS_CONFLICT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/v1/demands/{id}/cancel:
    post:
      tags: [Demands]
      summary: Cancel a Demand. Requires demand.transition.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Cancelled Demand
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Demand'
        '409':
          description: Demand already in an immutable status (code=STATUS_CONFLICT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/v1/demands/{id}/history:
    get:
      tags: [Demands]
      summary: >
        v2 delta (revised) — was always an empty list (no audit table existed).
        Now returns the real DemandAuditEntries trail; same shape as the new
        GET /{id}/audit below.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Audit entries, oldest first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DemandAuditEntry' }
        '404':
          description: Demand not found (code=NOT_FOUND)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ── v2 delta additions below (docs/API/specs/update_demand-schema.sql,
  # docs/API/specs/v2-delta-summary.docx §2) ──────────────────────────────────

  /api/v1/demands/{id}/flag-attention:
    post:
      tags: [Demands]
      summary: >
        v2 delta (P1, new, UX-10) — move a demand to NeedsAttention with a
        reason. Requires demand.transition.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FlagAttentionRequest' }
      responses:
        '200':
          description: Demand flagged NeedsAttention
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Demand' }
        '400':
          description: reason missing (code=VALIDATION_FAILED)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: Demand already in an immutable status (code=STATUS_CONFLICT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/v1/demands/{id}/retry-resolution:
    post:
      tags: [Demands]
      summary: >
        v2 delta (P1, new, UX-14) — re-emits the accepted event so
        DemandAcceptedConsumer re-attempts resolution; bounded by
        resolutionAttempts but not capped (open product decision). Requires
        demand.transition.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Retry requested (resolution happens asynchronously)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Demand' }
        '409':
          description: Demand is not NeedsAttention (code=STATUS_CONFLICT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/v1/demands/{id}/assign:
    post:
      tags: [Demands]
      summary: v2 delta (P3, new, UX-10) — set triage ownership. Requires demand.assign.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignDemandRequest' }
      responses:
        '200':
          description: Updated Demand
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Demand' }
        '409':
          description: Demand already in an immutable status (code=STATUS_CONFLICT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/v1/demands/{id}/escalate:
    post:
      tags: [Demands]
      summary: v2 delta (P3, new) — raise priority with a reason. Requires demand.escalate.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EscalateDemandRequest' }
      responses:
        '200':
          description: Updated Demand
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Demand' }
        '400':
          description: priority did not raise above the current value (code=VALIDATION_FAILED)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: Demand already in an immutable status (code=STATUS_CONFLICT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/v1/demands/bulk/accept:
    post:
      tags: [Demands]
      summary: v2 delta (P3, new) — accept many; per-item results. Requires demand.transition.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkDemandRequest' }
      responses:
        '200':
          description: Per-item results
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BulkDemandResponse' }

  /api/v1/demands/bulk/reject:
    post:
      tags: [Demands]
      summary: v2 delta (P3, new) — reject many with a shared reasonCode. Requires demand.transition.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkDemandRequest' }
      responses:
        '200':
          description: Per-item results
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BulkDemandResponse' }
        '400':
          description: reasonCode missing (code=VALIDATION_FAILED)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/v1/demands/bulk/cancel:
    post:
      tags: [Demands]
      summary: v2 delta (P3, new) — cancel many; per-item results. Requires demand.transition.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkDemandRequest' }
      responses:
        '200':
          description: Per-item results
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BulkDemandResponse' }

  /api/v1/demands/metrics:
    get:
      tags: [Demands]
      summary: >
        v2 delta (P3, new) — counts by status, fulfillment mode, priority, and
        age band. Requires demand.read.
      responses:
        '200':
          description: Aggregate counts
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DemandMetrics' }

  /api/v1/demands/{id}/split:
    post:
      tags: [Demands]
      summary: >
        v2 delta (P3, new) — creates N children from one parent; records
        DemandLineage(SplitFrom). The parent is not auto-cancelled. Requires
        demand.split.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SplitDemandRequest' }
      responses:
        '201':
          description: Children created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SplitDemandResponse' }
        '400':
          description: No children provided (code=VALIDATION_FAILED)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: Parent demand already in an immutable status (code=STATUS_CONFLICT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/v1/demands/merge:
    post:
      tags: [Demands]
      summary: >
        v2 delta (P3, new) — each mergedId -> Cancelled + DemandLineage(MergedInto).
        Per-item results. Requires demand.merge.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MergeDemandRequest' }
      responses:
        '200':
          description: Per-item results
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MergeDemandResponse' }
        '404':
          description: Survivor not found (code=NOT_FOUND)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: Survivor already in an immutable status (code=STATUS_CONFLICT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/v1/demands/{id}/audit:
    get:
      tags: [Demands]
      summary: v2 delta (P3, new) — unified audit trail. Requires demand.read.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Audit entries
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DemandAuditResponse' }
        '404':
          description: Demand not found (code=NOT_FOUND)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/v1/demands/history:
    get:
      tags: [Demands]
      summary: >
        v2 delta (P5, new) — customer-scoped history by external reference; no
        internal audit/attention detail. Requires demand.read.
      parameters:
        - { name: externalReferenceType, in: query, required: true, schema: { type: string } }
        - { name: externalReferenceId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Matching demands, newest first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CustomerDemandHistoryEntry' }
        '400':
          description: Missing query parameters (code=VALIDATION_FAILED)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /api/v1/work-requirements:
    post:
      tags: [WorkRequirements]
      summary: Create a WorkRequirement (starts empty, Draft, with no versions)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkRequirementRequest'
      responses:
        '201':
          description: WorkRequirement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkRequirement'
        '409':
          description: Code already in use for this tenant

  /api/v1/work-requirements/search:
    post:
      tags: [WorkRequirements]
      summary: Paged search over WorkRequirements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkRequirementSearchRequest'
      responses:
        '200':
          description: Paged WorkRequirement list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedWorkRequirementResult'
    get:
      tags: [WorkRequirements]
      summary: >
        v2 delta (P3) — paged search over the reconciled WorkRequirement
        aggregate (WorkRequirementsController, distinct from the POST above,
        which belongs to the first-generation RequirementDefinition module).
      parameters:
        - { name: status, in: query, schema: { $ref: '#/components/schemas/ReconciledWorkRequirementStatus' } }
        - { name: workType, in: query, schema: { type: string } }
        - { name: sourceType, in: query, schema: { type: string } }
        - { name: sourceId, in: query, schema: { type: string } }
        - { name: templateId, in: query, schema: { type: string, format: uuid } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: pageSize, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200':
          description: Paged reconciled WorkRequirement list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedReconciledWorkRequirementResult'

  /api/v1/work-requirements/{id}:
    get:
      tags: [WorkRequirements]
      summary: Get a WorkRequirement with all of its versions
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: WorkRequirement detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkRequirement'
        '404':
          description: Not found

  /api/v1/work-requirements/{id}/versions:
    post:
      tags: [WorkRequirements]
      summary: Create a new Draft RequirementVersion
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequirementVersionRequest'
      responses:
        '201':
          description: Draft RequirementVersion created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementVersion'

  /api/v1/work-requirements/{id}/versions/{versionNumber}:
    get:
      tags: [WorkRequirements]
      summary: Get a single RequirementVersion with its child requirements
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: versionNumber, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: RequirementVersion detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementVersion'
        '404':
          description: Not found
    patch:
      tags: [WorkRequirements]
      summary: Edit a Draft RequirementVersion (409 if not Draft)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: versionNumber, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequirementVersionRequest'
      responses:
        '200':
          description: Updated RequirementVersion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementVersion'
        '409':
          description: Version is not Draft

  /api/v1/work-requirements/{id}/versions/{versionNumber}/validate:
    post:
      tags: [WorkRequirements]
      summary: >
        Basic validation: duration fields internally consistent, at least one
        ResourceRequirement present. Marks the version Validated on success.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: versionNumber, in: path, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Validation outcome
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementValidationOutcome'

  /api/v1/work-requirements/{id}/versions/{versionNumber}/activate:
    post:
      tags: [WorkRequirements]
      summary: >
        Activate a Draft-passing-validate or Validated version; supersedes the
        prior Active version. Requires expectedVersion (optimistic concurrency
        on the parent WorkRequirement).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: versionNumber, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivateVersionRequest'
      responses:
        '200':
          description: Activated RequirementVersion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementVersion'
        '409':
          description: Version is not Draft/Validated
        '412':
          description: expectedVersion did not match the WorkRequirement's current concurrency version
        '422':
          description: Validation failed while activating a Draft version

  /api/v1/work-requirements/{id}/retire:
    post:
      tags: [WorkRequirements]
      summary: Retire a WorkRequirement (and its Active version, if any)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Retired WorkRequirement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkRequirement'
        '409':
          description: Already Retired

  /api/v1/work-requirements/{id}/snapshots:
    post:
      tags: [WorkRequirements]
      summary: Freeze a RequirementVersion (+ children) into an immutable RequirementSnapshot
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSnapshotRequest'
      responses:
        '201':
          description: RequirementSnapshot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementSnapshot'

  /api/v1/work-requirement-snapshots/{id}:
    get:
      tags: [WorkRequirements]
      summary: Get a RequirementSnapshot by id
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: RequirementSnapshot detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementSnapshot'
        '404':
          description: Not found

  # ── v2 delta additions below (docs/API/specs/update_requirement-schema.sql,
  # docs/API/specs/v2-delta-summary.docx §3) — the reconciled WorkRequirement/
  # RequirementTemplate API (WorkRequirementsController /
  # RequirementTemplatesController) was never previously documented here; only
  # the endpoints this delta touches are added, not the whole surface. ──

  /api/v1/work-requirements/{id}/resolved:
    get:
      tags: [WorkRequirements]
      summary: >
        v2 delta (UX-03/UX-04, revised) — full resolved requirement contract.
        Now accepts ?audience= to filter lines by disclosure level; server-side
        filtering, not client-side.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - name: audience
          in: query
          description: customer | provider | dispatcher (default). Unrecognized values return 400.
          schema: { type: string, enum: [customer, provider, dispatcher] }
      responses:
        '200':
          description: Resolved requirement contract, filtered to the requested audience
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolvedWorkRequirementResponse'
        '400':
          description: Unrecognized audience (code=VALIDATION_FAILED)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Not found
        '409':
          description: WorkRequirement is Invalid and cannot be read as a resolved contract

  /api/v1/work-requirements/{id}/explain:
    get:
      tags: [WorkRequirements]
      summary: >
        v2 delta (UX-03/UX-04, revised) — human-readable summary + per-requirement
        provenance. Now accepts ?audience= like GET .../resolved.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - name: audience
          in: query
          description: customer | provider | dispatcher (default)
          schema: { type: string, enum: [customer, provider, dispatcher] }
      responses:
        '200':
          description: Explain result, filtered to the requested audience
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExplainResponse'
        '400':
          description: Unrecognized audience (code=VALIDATION_FAILED)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Not found

  /api/v1/work-requirements/{id}/compare:
    get:
      tags: [WorkRequirements]
      summary: >
        v2 delta (UX-04, revised) — diff two RequirementVersion snapshots. Now
        accepts ?customerVisibleOnly= to restrict the diff to customer-visible
        lines, which is what drives approval scope for a customer-facing change.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: fromVersion, in: query, required: true, schema: { type: integer } }
        - { name: toVersion, in: query, required: true, schema: { type: integer } }
        - { name: customerVisibleOnly, in: query, schema: { type: boolean, default: false } }
      responses:
        '200':
          description: Diff between the two versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompareResponse'
        '404':
          description: One or both versions not found

  /api/v1/work-requirements/{id}/audit:
    get:
      tags: [WorkRequirements]
      summary: >
        v2 delta (P3, new) — unified audit trail across RequirementVersions. No
        separate "override" entity exists in this module; this is the same
        version history GetVersion/Compare already read, as a flat list.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Ordered audit entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkRequirementAuditResponse'
        '404':
          description: Not found

  /api/v1/work-requirement-templates/{templateId}/versions/{version}/requirements:
    put:
      tags: [WorkRequirementTemplates]
      summary: >
        v2 delta (UX-08, revised) — set a Draft template version's full
        requirement set. Now requires If-Match against the version's
        RowVersion; two authors editing the same draft can no longer silently
        overwrite each other.
      parameters:
        - { name: templateId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: version, in: path, required: true, schema: { type: integer } }
        - name: If-Match
          in: header
          required: true
          description: The template version's current rowVersion. Mismatch returns 412.
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequirementSetDto'
      responses:
        '200':
          description: Updated template version (rowVersion incremented)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequirementTemplateVersionDto'
        '400':
          description: Missing/malformed If-Match header, or the body failed validation (code=VALIDATION_FAILED)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Not found
        '409':
          description: Version is not Draft (code=TEMPLATE_IMMUTABLE)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '412':
          description: If-Match does not match the version's current rowVersion (code=VERSION_CONFLICT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '422':
          description: The requirement set contains incompatible constraints (code=INVALID_WORK_REQUIREMENT)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    DemandStatus:
      type: string
      description: >
        NeedsAttention (v2 delta) is non-terminal — reachable from Received (a
        validation error) and from Accepted (a downstream resolution failure).
      enum: [Received, Validating, Ready, Accepted, Rejected, Cancelled, Expired, NeedsAttention]

    ExternalDemandStatus:
      type: string
      description: >
        v2 delta (UX-17) — a derived, customer-safe projection over DemandStatus,
        returned by GET /{id} and POST /search only. Mapping: Received/Validating
        -> Submitted; Ready -> Received; NeedsAttention -> NeedsAttention;
        Accepted -> Confirmed; Rejected/Cancelled/Expired -> Cancelled.
      enum: [Submitted, Received, Confirmed, NeedsAttention, Cancelled]

    DemandAttentionOwner:
      type: string
      description: v2 delta (UX-10) — who owns fixing a demand that needs attention.
      enum: [Customer, Dispatcher, Administrator]

    DemandPriority:
      type: string
      enum: [Low, Normal, High, Urgent, Critical]

    DemandFulfillmentMode:
      type: string
      description: >
        The timing axis — how a demand is fulfilled in time. Orthogonal to
        demandType (the caller-defined nature-of-work axis): any demandType can
        pair with any fulfillmentMode. Platform-owned and closed. Defaults to
        Scheduled.
      enum: [OnDemand, Scheduled, Recurring, Standby]

    CreateDemandRequest:
      type: object
      required: [demandType, sourceSystem, externalReferenceType, externalReferenceId]
      properties:
        organizationId: { type: string, format: uuid, nullable: true }
        demandType: { type: string }
        fulfillmentMode:
          allOf: [{ $ref: '#/components/schemas/DemandFulfillmentMode' }]
          description: Defaults to Scheduled if omitted.
        sourceSystem: { type: string }
        sourceChannel: { type: string, nullable: true }
        priority:
          allOf: [{ $ref: '#/components/schemas/DemandPriority' }]
          description: Defaults to Normal if omitted.
        summary: { type: string, nullable: true }
        description: { type: string, nullable: true }
        requestedStartAtUtc: { type: string, format: date-time, nullable: true }
        requestedEndAtUtc: { type: string, format: date-time, nullable: true }
        requestedTimezone: { type: string, nullable: true }
        locationReference:
          type: string
          nullable: true
          description: Opaque JSON blob — no Location service exists yet
        externalReferenceType: { type: string }
        externalReferenceId: { type: string }

    UpdateDemandRequest:
      type: object
      required: [expectedVersion]
      properties:
        expectedVersion: { type: integer }
        priority: { $ref: '#/components/schemas/DemandPriority' }
        summary: { type: string, nullable: true }
        description: { type: string, nullable: true }
        requestedStartAtUtc: { type: string, format: date-time, nullable: true }
        requestedEndAtUtc: { type: string, format: date-time, nullable: true }
        requestedTimezone: { type: string, nullable: true }
        locationReference: { type: string, nullable: true }
        fulfillmentMode:
          allOf: [{ $ref: '#/components/schemas/DemandFulfillmentMode' }]
          description: Mutable only while the demand is Received.

    DemandSearchRequest:
      type: object
      properties:
        status: { $ref: '#/components/schemas/DemandStatus' }
        priority: { $ref: '#/components/schemas/DemandPriority' }
        demandType: { type: string, nullable: true }
        fulfillmentMode: { $ref: '#/components/schemas/DemandFulfillmentMode' }
        fromUtc: { type: string, format: date-time, nullable: true }
        toUtc: { type: string, format: date-time, nullable: true }
        page: { type: integer, default: 1 }
        pageSize: { type: integer, default: 20 }

    RejectDemandRequest:
      type: object
      required: [reasonCode]
      properties:
        reasonCode: { type: string }
        comment: { type: string, nullable: true }

    Demand:
      type: object
      required:
        - id, tenantId, demandType, fulfillmentMode, sourceSystem, status, priority
        - externalReferenceType, externalReferenceId, version
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        organizationId: { type: string, format: uuid, nullable: true }
        demandType: { type: string }
        fulfillmentMode: { $ref: '#/components/schemas/DemandFulfillmentMode' }
        sourceSystem: { type: string }
        sourceChannel: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/DemandStatus' }
        priority: { $ref: '#/components/schemas/DemandPriority' }
        summary: { type: string, nullable: true }
        description: { type: string, nullable: true }
        requestedStartAtUtc: { type: string, format: date-time, nullable: true }
        requestedEndAtUtc: { type: string, format: date-time, nullable: true }
        requestedTimezone: { type: string, nullable: true }
        locationReference: { type: string, nullable: true }
        requirementReferenceId: { type: string, format: uuid, nullable: true }
        externalReferenceType: { type: string }
        externalReferenceId: { type: string }
        version: { type: integer }
        # v2 delta additions below
        assignedTo: { type: string, nullable: true, description: v2 delta (UX-10) — actor id or queue name. }
        assignedRole: { allOf: [{ $ref: '#/components/schemas/DemandAttentionOwner' }], nullable: true }
        attentionReason: { type: string, nullable: true, description: Required whenever status = NeedsAttention. }
        attentionIssuesJson: { type: string, nullable: true, description: "jsonb — snapshot of issues[] or the resolution failure detail." }
        resolutionAttempts: { type: integer, description: Counted, not capped — see the v2 delta's open D-02 product decision. }
        lastResolutionError: { type: string, nullable: true }
        recurrenceRule: { type: string, nullable: true, description: RFC 5545 RRULE. Only meaningful when fulfillmentMode = Recurring. }
        seriesId: { type: string, format: uuid, nullable: true }

    DemandWithExternalStatus:
      description: v2 delta — the shape GET /{id} and POST /search return (Demand + externalStatus).
      allOf:
        - $ref: '#/components/schemas/Demand'
        - type: object
          required: [externalStatus]
          properties:
            externalStatus: { $ref: '#/components/schemas/ExternalDemandStatus' }

    DemandValidationIssue:
      type: object
      required: [code, severity, message]
      properties:
        field: { type: string, nullable: true }
        code: { type: string }
        severity: { type: string, enum: [Error, Warning] }
        message: { type: string }

    ErrorEnvelope:
      type: object
      required: [error, code, traceId]
      description: The shape every 4xx response from the Demands API shares.
      properties:
        error: { type: string, description: Human-readable summary (backward-compatible). }
        code:
          type: string
          description: Stable, machine-branchable discriminator.
          enum:
            - VALIDATION_FAILED
            - IDEMPOTENCY_CONFLICT
            - VERSION_CONFLICT
            - STATUS_CONFLICT
            - NOT_FOUND
        traceId: { type: string, description: Correlation id for support requests. }
        issues:
          type: array
          description: Present when field-level detail exists (VALIDATION_FAILED and some STATUS_CONFLICT cases).
          items: { $ref: '#/components/schemas/DemandValidationIssue' }

    PagedDemandResult:
      type: object
      required: [items, page, pageSize, totalCount]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/DemandWithExternalStatus' }
        page: { type: integer }
        pageSize: { type: integer }
        totalCount: { type: integer }

    DemandValidationResult:
      type: object
      required: [demandId, status, validatedAt, issues]
      properties:
        demandId: { type: string, format: uuid }
        status:
          type: string
          enum: [Invalid, ValidWithWarnings, Valid]
        validatedAt: { type: string, format: date-time }
        issues:
          type: array
          items: { $ref: '#/components/schemas/DemandValidationIssue' }

    # ── v2 delta schemas (docs/API/specs/update_demand-schema.sql) ────────────

    FlagAttentionRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string }
        issuesJson: { type: string, nullable: true }
        assignedRole:
          allOf: [{ $ref: '#/components/schemas/DemandAttentionOwner' }]
          description: Defaults to Dispatcher if omitted.

    AssignDemandRequest:
      type: object
      properties:
        assignedTo: { type: string, nullable: true }
        assignedRole: { allOf: [{ $ref: '#/components/schemas/DemandAttentionOwner' }], nullable: true }

    EscalateDemandRequest:
      type: object
      required: [priority]
      properties:
        priority:
          allOf: [{ $ref: '#/components/schemas/DemandPriority' }]
          description: Must be strictly higher than the demand's current priority.
        reason: { type: string, nullable: true }

    BulkDemandRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items: { type: string, format: uuid }
        reasonCode: { type: string, nullable: true, description: Required for bulk/reject; shared across every id in the batch. }
        comment: { type: string, nullable: true }

    BulkDemandItemResult:
      type: object
      required: [id, success]
      properties:
        id: { type: string, format: uuid }
        success: { type: boolean }
        error: { type: string, nullable: true }

    BulkDemandResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items: { $ref: '#/components/schemas/BulkDemandItemResult' }

    DemandMetrics:
      type: object
      required: [byStatus, byFulfillmentMode, byPriority, ageBands]
      properties:
        byStatus:
          type: array
          items:
            type: object
            properties: { status: { $ref: '#/components/schemas/DemandStatus' }, count: { type: integer } }
        byFulfillmentMode:
          type: array
          items:
            type: object
            properties: { fulfillmentMode: { $ref: '#/components/schemas/DemandFulfillmentMode' }, count: { type: integer } }
        byPriority:
          type: array
          items:
            type: object
            properties: { priority: { $ref: '#/components/schemas/DemandPriority' }, count: { type: integer } }
        ageBands:
          type: object
          properties:
            underOneHour: { type: integer }
            oneHourToOneDay: { type: integer }
            oneDayToOneWeek: { type: integer }
            overOneWeek: { type: integer }

    SplitChildRequest:
      type: object
      description: Every field is optional and inherits from the parent Demand when omitted.
      properties:
        summary: { type: string, nullable: true }
        description: { type: string, nullable: true }
        requestedStartAtUtc: { type: string, format: date-time, nullable: true }
        requestedEndAtUtc: { type: string, format: date-time, nullable: true }
        priority: { $ref: '#/components/schemas/DemandPriority' }

    SplitDemandRequest:
      type: object
      required: [children]
      properties:
        children:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/SplitChildRequest' }
        reason: { type: string, nullable: true }

    SplitDemandResponse:
      type: object
      required: [parentId, children]
      properties:
        parentId: { type: string, format: uuid }
        children:
          type: array
          items: { $ref: '#/components/schemas/Demand' }

    MergeDemandRequest:
      type: object
      required: [survivorId, mergedIds]
      properties:
        survivorId: { type: string, format: uuid }
        mergedIds:
          type: array
          items: { type: string, format: uuid }
        reason: { type: string, nullable: true }

    MergeDemandResponse:
      type: object
      required: [survivorId, results]
      properties:
        survivorId: { type: string, format: uuid }
        results:
          type: array
          items: { $ref: '#/components/schemas/BulkDemandItemResult' }

    DemandAuditEntry:
      type: object
      required: [changeType, occurredAt]
      properties:
        changeType: { type: string, description: e.g. Created, Validated, Accepted, FlaggedForAttention, Assigned, Escalated, Split, Merged. }
        fromStatus: { allOf: [{ $ref: '#/components/schemas/DemandStatus' }], nullable: true }
        toStatus: { allOf: [{ $ref: '#/components/schemas/DemandStatus' }], nullable: true }
        actorId: { type: string, nullable: true }
        actorRole: { type: string, nullable: true }
        correlationId: { type: string, nullable: true }
        reason: { type: string, nullable: true }
        occurredAt: { type: string, format: date-time }

    DemandAuditResponse:
      type: object
      required: [demandId, entries]
      properties:
        demandId: { type: string, format: uuid }
        entries:
          type: array
          items: { $ref: '#/components/schemas/DemandAuditEntry' }

    CustomerDemandHistoryEntry:
      type: object
      description: v2 delta (P5) — customer-safe fields only, no internal audit/attention detail.
      required: [id, externalStatus]
      properties:
        id: { type: string, format: uuid }
        externalStatus: { $ref: '#/components/schemas/ExternalDemandStatus' }
        summary: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }

    WorkRequirementStatus:
      type: string
      enum: [Draft, Active, Inactive, Retired]

    RequirementVersionStatus:
      type: string
      enum: [Draft, Validated, Active, Superseded, Retired]

    DurationType:
      type: string
      enum: [Fixed, Range]

    CapabilityImportance:
      type: string
      enum: [Mandatory, Preferred, Optional]

    LocationConstraintMode:
      type: string
      enum: [FixedLocation, CustomerLocation, ResourceLocation, Virtual, Flexible]

    CreateWorkRequirementRequest:
      type: object
      required: [code, name]
      properties:
        code: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        category: { type: string, nullable: true }

    WorkRequirementSearchRequest:
      type: object
      properties:
        status: { $ref: '#/components/schemas/WorkRequirementStatus' }
        category: { type: string, nullable: true }
        page: { type: integer, default: 1 }
        pageSize: { type: integer, default: 20 }

    WorkRequirement:
      type: object
      required: [id, tenantId, code, name, status, currentVersionNumber, concurrencyVersion]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        category: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/WorkRequirementStatus' }
        currentVersionNumber: { type: integer }
        activeVersionNumber: { type: integer, nullable: true }
        concurrencyVersion: { type: integer }
        versions:
          type: array
          items: { $ref: '#/components/schemas/RequirementVersion' }

    PagedWorkRequirementResult:
      type: object
      required: [items, page, pageSize, totalCount]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/WorkRequirement' }
        page: { type: integer }
        pageSize: { type: integer }
        totalCount: { type: integer }

    CapabilityRequirementDto:
      type: object
      required: [capabilityCode, importance]
      properties:
        capabilityCode: { type: string }
        minimumLevel: { type: integer, nullable: true }
        importance: { $ref: '#/components/schemas/CapabilityImportance' }

    SkillRequirementDto:
      type: object
      required: [skillCode, mandatory]
      properties:
        skillCode: { type: string }
        minimumLevel: { type: integer, nullable: true }
        mandatory: { type: boolean }

    CertificationRequirementDto:
      type: object
      required: [certificationTypeCode, mandatory]
      properties:
        certificationTypeCode: { type: string }
        mandatory: { type: boolean }

    ResourceRequirementDto:
      type: object
      required: [resourceTypeCode, minimumQuantity, preferredQuantity, maximumQuantity, mandatory]
      properties:
        resourceTypeCode: { type: string }
        role: { type: string, nullable: true }
        minimumQuantity: { type: integer }
        preferredQuantity: { type: integer }
        maximumQuantity: { type: integer }
        mandatory: { type: boolean }
        capabilities:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/CapabilityRequirementDto' }
        skills:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/SkillRequirementDto' }
        certifications:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/CertificationRequirementDto' }

    LocationConstraintDto:
      type: object
      required: [mode]
      properties:
        mode: { $ref: '#/components/schemas/LocationConstraintMode' }
        maximumTravelDistanceKm: { type: number, nullable: true }
        maximumTravelTimeMinutes: { type: integer, nullable: true }

    RequirementVersionRequest:
      type: object
      required: [durationType, preWorkBufferMinutes, postWorkBufferMinutes, resourceRequirements]
      properties:
        changeSummary: { type: string, nullable: true }
        effectiveFrom: { type: string, format: date, nullable: true }
        effectiveTo: { type: string, format: date, nullable: true }
        durationType: { $ref: '#/components/schemas/DurationType' }
        fixedDurationMinutes: { type: integer, nullable: true }
        minimumDurationMinutes: { type: integer, nullable: true }
        expectedDurationMinutes: { type: integer, nullable: true }
        maximumDurationMinutes: { type: integer, nullable: true }
        preWorkBufferMinutes: { type: integer, default: 0 }
        postWorkBufferMinutes: { type: integer, default: 0 }
        resourceRequirements:
          type: array
          items: { $ref: '#/components/schemas/ResourceRequirementDto' }
        locationConstraints:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/LocationConstraintDto' }

    RequirementVersion:
      type: object
      required: [id, workRequirementId, versionNumber, status, durationType, preWorkBufferMinutes, postWorkBufferMinutes]
      properties:
        id: { type: string, format: uuid }
        workRequirementId: { type: string, format: uuid }
        versionNumber: { type: integer }
        status: { $ref: '#/components/schemas/RequirementVersionStatus' }
        effectiveFrom: { type: string, format: date, nullable: true }
        effectiveTo: { type: string, format: date, nullable: true }
        changeSummary: { type: string, nullable: true }
        durationType: { $ref: '#/components/schemas/DurationType' }
        fixedDurationMinutes: { type: integer, nullable: true }
        minimumDurationMinutes: { type: integer, nullable: true }
        expectedDurationMinutes: { type: integer, nullable: true }
        maximumDurationMinutes: { type: integer, nullable: true }
        preWorkBufferMinutes: { type: integer }
        postWorkBufferMinutes: { type: integer }
        resourceRequirements:
          type: array
          items: { $ref: '#/components/schemas/ResourceRequirementDto' }
        locationConstraints:
          type: array
          items: { $ref: '#/components/schemas/LocationConstraintDto' }

    RequirementValidationOutcome:
      type: object
      required: [status, issues]
      properties:
        status:
          type: string
          enum: [Valid, Invalid]
        issues:
          type: array
          items: { type: string }

    ActivateVersionRequest:
      type: object
      required: [expectedVersion]
      properties:
        expectedVersion: { type: integer }

    CreateSnapshotRequest:
      type: object
      required: [versionNumber]
      properties:
        versionNumber: { type: integer }
        reason: { type: string, nullable: true }

    RequirementSnapshot:
      type: object
      required: [id, tenantId, sourceRequirementId, sourceVersionNumber, definitionJson]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        sourceRequirementId: { type: string, format: uuid }
        sourceVersionNumber: { type: integer }
        definitionJson:
          type: string
          description: Serialized copy of the RequirementVersion + its children at freeze time
        reason: { type: string, nullable: true }

    # ── v2 delta schemas — the reconciled WorkRequirement/RequirementTemplate
    # model (Eswmp.Work.Models.WorkRequirement, RequirementTemplate). Distinct
    # names from the legacy schemas above (WorkRequirement, WorkRequirementStatus,
    # PagedWorkRequirementResult, ...), which belong to the unrelated
    # first-generation RequirementDefinition module and must not be reused here.

    RequirementLineVisibilityLevel:
      type: string
      description: >
        Per-line disclosure level (v2 delta, UX-03/UX-04). Unset on a line
        defaults to Internal — the safe choice.
      enum: [Customer, Provider, Internal]

    ReconciledWorkRequirementStatus:
      type: string
      enum: [Draft, Validating, Valid, Invalid, Superseded, Cancelled, Completed]

    ReconciledWorkRequirementPriority:
      type: string
      enum: [Low, Normal, High, Urgent, Critical]

    ReconciledWorkRequirementSummary:
      type: object
      required: [id, tenantId, sourceType, sourceId, workType, status, priority, requirementVersion, createdAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        sourceType: { type: string }
        sourceId: { type: string }
        sourceVersion: { type: integer, nullable: true }
        templateId: { type: string, format: uuid, nullable: true }
        templateCode: { type: string, nullable: true }
        templateVersion: { type: integer, nullable: true }
        workType: { type: string }
        workCategory: { type: string, nullable: true }
        serviceMode: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/ReconciledWorkRequirementStatus' }
        priority: { $ref: '#/components/schemas/ReconciledWorkRequirementPriority' }
        effectiveFrom: { type: string, format: date-time, nullable: true }
        effectiveTo: { type: string, format: date-time, nullable: true }
        requirementVersion: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time, nullable: true }

    PagedReconciledWorkRequirementResult:
      type: object
      required: [items, page, pageSize, totalCount]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ReconciledWorkRequirementSummary' }
        page: { type: integer }
        pageSize: { type: integer }
        totalCount: { type: integer }

    RequirementLineDto:
      type: object
      description: >
        Shared shape of every per-line item below (resourceRequirements,
        capabilityRequirements, ...): the category-specific fields plus the
        two v2 delta additions, id and visibilityLevel. additionalProperties
        carries the category-specific fields — full shape per category is
        src/Eswmp.Work/Services/RequirementSetDto.cs.
      additionalProperties: true
      properties:
        id: { type: string, format: uuid, nullable: true, description: Set on read (GET .../resolved); ignored on write. }
        visibilityLevel:
          allOf: [{ $ref: '#/components/schemas/RequirementLineVisibilityLevel' }]
          nullable: true
          description: Settable on write (PUT .../requirements); defaults to Internal if omitted.

    RequirementSetDto:
      type: object
      required: [resourceRequirements, durationRequirement]
      description: >
        The one shape shared by PUT .../work-requirement-templates/{id}/versions/{v}/requirements
        (request body) and GET /work-requirements/{id}/resolved (response body).
        Full per-category field shape: src/Eswmp.Work/Services/RequirementSetDto.cs.
      properties:
        resourceRequirements:
          type: array
          items: { $ref: '#/components/schemas/RequirementLineDto' }
        durationRequirement: { $ref: '#/components/schemas/RequirementLineDto' }
        capabilityRequirements:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/RequirementLineDto' }
        certificationRequirements:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/RequirementLineDto' }
        capacityRequirements:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/RequirementLineDto' }
        timeRequirement:
          allOf: [{ $ref: '#/components/schemas/RequirementLineDto' }]
          nullable: true
        locationRequirement:
          allOf: [{ $ref: '#/components/schemas/RequirementLineDto' }]
          nullable: true
        executionRequirement:
          allOf: [{ $ref: '#/components/schemas/RequirementLineDto' }]
          nullable: true
        travelRequirement:
          allOf: [{ $ref: '#/components/schemas/RequirementLineDto' }]
          nullable: true
        bufferRequirements:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/RequirementLineDto' }
        dependencyRequirements:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/RequirementLineDto' }
        constraints:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/RequirementLineDto' }
        preferences:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/RequirementLineDto' }

    ResolvedWorkRequirementResponse:
      allOf:
        - type: object
          required: [workRequirementId, requirementVersion, workType]
          properties:
            workRequirementId: { type: string, format: uuid }
            requirementVersion: { type: integer }
            workType: { type: string }
        - $ref: '#/components/schemas/RequirementSetDto'

    DerivedRequirementExplanation:
      type: object
      required: [requirement, source]
      properties:
        requirement: { type: string }
        source: { type: string }

    ExplainResponse:
      type: object
      required: [summary, derivedRequirements]
      properties:
        summary: { type: string }
        derivedRequirements:
          type: array
          items: { $ref: '#/components/schemas/DerivedRequirementExplanation' }

    CompareResponse:
      type: object
      required: [workRequirementId, fromVersion, toVersion, changedCategories, details]
      properties:
        workRequirementId: { type: string, format: uuid }
        fromVersion: { type: integer }
        toVersion: { type: integer }
        changedCategories:
          type: array
          items: { type: string }
        details:
          type: object
          description: Keyed by changed category; each value is { before, after }.
          additionalProperties: true

    WorkRequirementAuditEntry:
      type: object
      required: [version]
      properties:
        version: { type: integer }
        changeType: { type: string, nullable: true }
        changeReason: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        createdBy: { type: string, nullable: true }

    WorkRequirementAuditResponse:
      type: object
      required: [workRequirementId, entries]
      properties:
        workRequirementId: { type: string, format: uuid }
        entries:
          type: array
          items: { $ref: '#/components/schemas/WorkRequirementAuditEntry' }

    RequirementTemplateVersionDto:
      type: object
      required: [id, tenantId, templateId, version, status, definitionJson, rowVersion]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        templateId: { type: string, format: uuid }
        version: { type: integer }
        effectiveFrom: { type: string, format: date-time, nullable: true }
        effectiveTo: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [Draft, Active, Superseded, Retired] }
        changeReason: { type: string, nullable: true }
        definitionJson: { type: string }
        rowVersion:
          type: integer
          format: int64
          description: v2 delta (UX-08) concurrency guard — pass back as If-Match on the next PUT.
