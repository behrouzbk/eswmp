openapi: 3.1.0
info:
  title: ESWMP Core API
  version: v1
  description: |
    Scheduling primitives: Resources, Calendars, Availability Rules, Reservations,
    and Appointments. This service owns scheduling and nothing else — it never
    stores or returns any data belonging to the caller's own domain beyond the
    opaque externalReferenceType/externalReferenceId pair. See docs/ESWMP_VISION.md
    "Key rule".
servers:
  - url: http://localhost:6001
    description: Local development
security:
  - BearerAuth: []

paths:
  /api/v1/resources:
    post:
      tags: [Resources]
      summary: Register a Resource (a person, vehicle, room, or piece of equipment that can be scheduled)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResourceRequest'
      responses:
        '201':
          description: Resource created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'
    get:
      tags: [Resources]
      summary: List resources for the tenant
      parameters:
        - name: resourceType
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/ResourceStatus' }
      responses:
        '200':
          description: Paged resource list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResourceResult'

  /api/v1/resources/{id}:
    get:
      tags: [Resources]
      summary: Get a single Resource
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Resource detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resource'

  /api/v1/resources/{id}/activate:
    post:
      tags: [Resources]
      summary: Activate a Resource (Draft/PendingVerification/Inactive -> Active)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResourceLifecycleRequest' }
      responses:
        '200': { description: Resource activated, content: { application/json: { schema: { $ref: '#/components/schemas/Resource' } } } }
        '409': { description: Invalid transition from current status }
        '412': { description: expectedVersion did not match current Version }

  /api/v1/resources/{id}/suspend:
    post:
      tags: [Resources]
      summary: Suspend an Active Resource
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResourceLifecycleRequest' }
      responses:
        '200': { description: Resource suspended, content: { application/json: { schema: { $ref: '#/components/schemas/Resource' } } } }
        '409': { description: Invalid transition from current status }
        '412': { description: expectedVersion did not match current Version }

  /api/v1/resources/{id}/reactivate:
    post:
      tags: [Resources]
      summary: Reactivate a Suspended Resource
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResourceLifecycleRequest' }
      responses:
        '200': { description: Resource reactivated, content: { application/json: { schema: { $ref: '#/components/schemas/Resource' } } } }
        '409': { description: Invalid transition from current status }
        '412': { description: expectedVersion did not match current Version }

  /api/v1/resources/{id}/deactivate:
    post:
      tags: [Resources]
      summary: Deactivate an Active or Suspended Resource
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResourceLifecycleRequest' }
      responses:
        '200': { description: Resource deactivated, content: { application/json: { schema: { $ref: '#/components/schemas/Resource' } } } }
        '409': { description: Invalid transition from current status }
        '412': { description: expectedVersion did not match current Version }

  /api/v1/resources/{id}/retire:
    post:
      tags: [Resources]
      summary: Retire a Resource permanently (terminal state)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResourceLifecycleRequest' }
      responses:
        '200': { description: Resource retired, content: { application/json: { schema: { $ref: '#/components/schemas/Resource' } } } }
        '409': { description: Invalid transition from current status }
        '412': { description: expectedVersion did not match current Version }

  /api/v1/resources/{id}/capabilities:
    post:
      tags: [Resources]
      summary: Grant a capability to a Resource
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddResourceCapabilityRequest' }
      responses:
        '201': { description: Capability added, content: { application/json: { schema: { $ref: '#/components/schemas/ResourceCapability' } } } }

  /api/v1/resources/{id}/skills:
    post:
      tags: [Resources]
      summary: Add a skill to a Resource
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddResourceSkillRequest' }
      responses:
        '201': { description: Skill added, content: { application/json: { schema: { $ref: '#/components/schemas/ResourceSkill' } } } }

  /api/v1/resources/{id}/certifications:
    post:
      tags: [Resources]
      summary: Add a certification to a Resource
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddResourceCertificationRequest' }
      responses:
        '201': { description: Certification added, content: { application/json: { schema: { $ref: '#/components/schemas/ResourceCertification' } } } }

  /api/v1/capacity/profiles:
    post:
      tags: [Capacity]
      summary: Create a Capacity profile for a Resource
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCapacityProfileRequest' }
      responses:
        '201': { description: Profile created, content: { application/json: { schema: { $ref: '#/components/schemas/CapacityProfile' } } } }

  /api/v1/capacity/profiles/{id}:
    get:
      tags: [Capacity]
      summary: Get a Capacity profile
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Profile detail, content: { application/json: { schema: { $ref: '#/components/schemas/CapacityProfile' } } } }
        '404': { description: Not found }

  /api/v1/capacity/profiles/{id}/definitions:
    post:
      tags: [Capacity]
      summary: Add a Capacity definition (one measurable dimension) to a profile
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCapacityDefinitionRequest' }
      responses:
        '201': { description: Definition created, content: { application/json: { schema: { $ref: '#/components/schemas/CapacityDefinition' } } } }
        '404': { description: Profile not found }

  /api/v1/capacity/definitions/{id}:
    patch:
      tags: [Capacity]
      summary: Update a Capacity definition
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCapacityDefinitionRequest' }
      responses:
        '200': { description: Definition updated, content: { application/json: { schema: { $ref: '#/components/schemas/CapacityDefinition' } } } }
        '404': { description: Not found }

  /api/v1/capacity/resolve:
    post:
      tags: [Capacity]
      summary: Compute effective/held/consumed/remaining capacity for a Resource dimension over a window
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResolveCapacityRequest' }
      responses:
        '200': { description: Resolved capacity, content: { application/json: { schema: { $ref: '#/components/schemas/ResolveCapacityResponse' } } } }
        '404': { description: No active definition for the resource/dimension }

  /api/v1/capacity/explain:
    post:
      tags: [Capacity]
      summary: Breakdown of how a capacity resolution was computed (defined/effective/held/consumed/remaining)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResolveCapacityRequest' }
      responses:
        '200': { description: Capacity explanation, content: { application/json: { schema: { $ref: '#/components/schemas/ExplainCapacityResponse' } } } }
        '404': { description: No active definition for the resource/dimension }

  /api/v1/capacity/holds:
    post:
      tags: [Capacity]
      summary: Atomically acquire a capacity hold (fails with 409 if it would exceed remaining capacity)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCapacityHoldRequest' }
      responses:
        '201': { description: Hold acquired, content: { application/json: { schema: { $ref: '#/components/schemas/CapacityHold' } } } }
        '200': { description: Duplicate request replayed by IdempotencyKey — original hold returned unchanged }
        '404': { description: No active definition for the resource/dimension }
        '409': { description: Requested quantity exceeds remaining capacity }

  /api/v1/capacity/holds/{id}:
    get:
      tags: [Capacity]
      summary: Get a Capacity hold
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Hold detail, content: { application/json: { schema: { $ref: '#/components/schemas/CapacityHold' } } } }
        '404': { description: Not found }

  /api/v1/capacity/holds/{id}/commit:
    post:
      tags: [Capacity]
      summary: Convert an active Hold into a durable Consumption record
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Hold committed, content: { application/json: { schema: { $ref: '#/components/schemas/CapacityConsumption' } } } }
        '404': { description: Not found }
        '409': { description: Hold is not Active }

  /api/v1/capacity/holds/{id}/release:
    post:
      tags: [Capacity]
      summary: Release an active Hold without consuming capacity
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Hold released, content: { application/json: { schema: { $ref: '#/components/schemas/CapacityHold' } } } }
        '404': { description: Not found }
        '409': { description: Hold is not Active }

  /api/v1/capacity/consumptions/{id}/release:
    post:
      tags: [Capacity]
      summary: Release a committed Consumption, freeing its capacity back
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Consumption released, content: { application/json: { schema: { $ref: '#/components/schemas/CapacityConsumption' } } } }
        '404': { description: Not found }
        '409': { description: Consumption is not Committed }

  /api/v1/availability-rules:
    post:
      tags: [Availability]
      summary: Add a recurring availability rule for a Resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAvailabilityRuleRequest'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityRule'

  /api/v1/resources/{id}/availability:
    get:
      tags: [Availability]
      summary: Get a Resource's availability windows for a date
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: date
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: Availability windows for the date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityWindowsResponse'

  /api/v1/resources/{id}/time-off-requests:
    post:
      tags: [Availability]
      summary: Request time off for a Resource
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTimeOffRequest' }
      responses:
        '201': { description: Time off requested (PendingApproval), content: { application/json: { schema: { $ref: '#/components/schemas/TimeOff' } } } }

  /api/v1/time-off-requests/{id}/approve:
    post:
      tags: [Availability]
      summary: Approve a pending time off request
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Approved, content: { application/json: { schema: { $ref: '#/components/schemas/TimeOff' } } } }
        '409': { description: Not in PendingApproval }

  /api/v1/time-off-requests/{id}/reject:
    post:
      tags: [Availability]
      summary: Reject a pending time off request
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Rejected, content: { application/json: { schema: { $ref: '#/components/schemas/TimeOff' } } } }
        '409': { description: Not in PendingApproval }

  /api/v1/time-off-requests/{id}/cancel:
    post:
      tags: [Availability]
      summary: Cancel a pending or approved time off request
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Cancelled, content: { application/json: { schema: { $ref: '#/components/schemas/TimeOff' } } } }
        '409': { description: Not in PendingApproval or Approved }

  /api/v1/resources/{id}/availability-overrides:
    post:
      tags: [Availability]
      summary: Force-available or force-unavailable override for a Resource over a window
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAvailabilityOverrideRequest' }
      responses:
        '201': { description: Override created, content: { application/json: { schema: { $ref: '#/components/schemas/AvailabilityOverride' } } } }

  /api/v1/availability/resolve:
    post:
      tags: [Availability]
      summary: Resolve a Resource's free intervals over an arbitrary window, applying the full rule/exception/time-off/override priority stack
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResolveAvailabilityRequest' }
      responses:
        '200': { description: Free intervals, content: { application/json: { schema: { $ref: '#/components/schemas/ResolveAvailabilityResponse' } } } }

  /api/v1/availability/batch-resolve:
    post:
      tags: [Availability]
      summary: Resolve free intervals for several Resources at once
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BatchResolveAvailabilityRequest' }
      responses:
        '200':
          description: Free intervals per resource
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ResolveAvailabilityResponse' }

  /api/v1/slots/search:
    post:
      tags: [Slots]
      summary: Search for bookable slots using the gap-elimination Slot Optimizer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlotSearchRequest'
      responses:
        '200':
          description: Candidate slots that do not create an unsellable gap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotSearchResponse'

  /api/v1/duration/estimate:
    post:
      tags: [Duration]
      summary: Estimate reservation duration from tenant-configured size brackets and tag rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DurationEstimateRequest'
      responses:
        '200':
          description: Estimated duration with any applicable safety alert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DurationEstimateResponse'

  /api/v1/reservations:
    post:
      tags: [Reservations]
      summary: Create a temporary hold on a Resource for a time window
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
      responses:
        '201':
          description: Reservation held
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        '409':
          description: The Resource already has an overlapping Held or Confirmed reservation for the requested time window
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }

  /api/v1/reservations/{id}/confirm:
    post:
      tags: [Reservations]
      summary: Confirm a held reservation (creates the Appointment)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Reservation confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'

  /api/v1/reservations/{id}/cancel:
    post:
      tags: [Reservations]
      summary: Cancel a held or confirmed reservation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Reservation cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'

  /api/v1/resources/{id}/calendar:
    get:
      tags: [Calendar]
      summary: Get a Resource's confirmed appointments for a date range
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: from
          in: query
          required: true
          schema: { type: string, format: date }
        - name: to
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: Calendar entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ResourceStatus:
      type: string
      description: >-
        Expanded from the original 3-state (Active/Inactive/Suspended) enum to a
        full onboarding-through-retirement lifecycle.
      enum: [Draft, PendingVerification, Active, Suspended, Inactive, Retired]

    VerificationStatus:
      type: string
      enum: [NotRequired, NotStarted, Pending, Verified, Rejected, Expired]

    CreateResourceRequest:
      type: object
      required: [resourceType, name, timezone]
      properties:
        resourceType:
          type: string
          description: Caller-defined type label, e.g. "GroomingVan", "MeetingRoom", "DeliveryDriver"
        name: { type: string }
        timezone: { type: string, example: "America/Toronto" }
        capacity: { type: integer, nullable: true }
        skills:
          type: array
          items: { type: string }
        locationLatitude: { type: number, format: double, nullable: true }
        locationLongitude: { type: number, format: double, nullable: true }

    Resource:
      type: object
      required: [id, tenantId, resourceType, name, timezone, status, verificationStatus, version]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        resourceType: { type: string }
        resourceTypeId: { type: string, format: uuid, nullable: true, description: "Optional link to a tenant-defined ResourceType row." }
        name: { type: string }
        timezone: { type: string }
        status: { $ref: '#/components/schemas/ResourceStatus' }
        verificationStatus: { $ref: '#/components/schemas/VerificationStatus' }
        version: { type: integer, description: "Optimistic-concurrency token for lifecycle transitions." }
        capacity: { type: integer, nullable: true }
        skills:
          type: array
          items: { type: string }
        location:
          $ref: '#/components/schemas/GeoPoint'

    ResourceLifecycleRequest:
      type: object
      properties:
        reasonCode: { type: string, nullable: true }
        comment: { type: string, nullable: true }
        expectedVersion: { type: integer, nullable: true, description: "If supplied and it doesn't match the Resource's current version, returns 412." }

    AddResourceCapabilityRequest:
      type: object
      required: [capabilityCode, level]
      properties:
        capabilityCode: { type: string, example: "HEAVY_LIFTING" }
        level: { type: integer, minimum: 1, maximum: 4, default: 1 }
        effectiveFrom: { type: string, format: date, nullable: true }
        effectiveTo: { type: string, format: date, nullable: true }

    ResourceCapability:
      type: object
      required: [id, resourceId, capabilityCode, level, status]
      properties:
        id: { type: string, format: uuid }
        resourceId: { type: string, format: uuid }
        capabilityCode: { type: string }
        level: { type: integer }
        status: { type: string, enum: [Pending, Active, Suspended, Expired, Revoked] }
        effectiveFrom: { type: string, format: date, nullable: true }
        effectiveTo: { type: string, format: date, nullable: true }

    AddResourceSkillRequest:
      type: object
      required: [skillCode, level]
      properties:
        skillCode: { type: string }
        level: { type: integer, minimum: 1, default: 1 }
        yearsOfExperience: { type: number, nullable: true }
        verified: { type: boolean, default: false }

    ResourceSkill:
      type: object
      required: [id, resourceId, skillCode, level, verified]
      properties:
        id: { type: string, format: uuid }
        resourceId: { type: string, format: uuid }
        skillCode: { type: string }
        level: { type: integer }
        yearsOfExperience: { type: number, nullable: true }
        verified: { type: boolean }

    AddResourceCertificationRequest:
      type: object
      required: [certificationTypeCode]
      properties:
        certificationTypeCode: { type: string }
        credentialReference: { type: string, nullable: true }
        issuedAt: { type: string, format: date, nullable: true }
        expiresAt: { type: string, format: date, nullable: true }

    ResourceCertification:
      type: object
      required: [id, resourceId, certificationTypeCode, status]
      properties:
        id: { type: string, format: uuid }
        resourceId: { type: string, format: uuid }
        certificationTypeCode: { type: string }
        credentialReference: { type: string, nullable: true }
        issuedAt: { type: string, format: date, nullable: true }
        expiresAt: { type: string, format: date, nullable: true }
        status: { type: string, enum: [Submitted, PendingVerification, Valid, Rejected, Expired, Revoked] }

    GeoPoint:
      type: object
      nullable: true
      properties:
        latitude: { type: number, format: double }
        longitude: { type: number, format: double }

    PagedResourceResult:
      type: object
      required: [items, page, pageSize, totalCount]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Resource' }
        page: { type: integer }
        pageSize: { type: integer }
        totalCount: { type: integer }

    CreateAvailabilityRuleRequest:
      type: object
      required: [resourceId, dayOfWeek, startTime, endTime]
      properties:
        resourceId: { type: string, format: uuid }
        dayOfWeek: { type: integer, minimum: 0, maximum: 6 }
        startTime: { type: string, example: "08:00" }
        endTime: { type: string, example: "18:00" }
        effectiveFrom: { type: string, format: date, nullable: true }
        effectiveTo: { type: string, format: date, nullable: true }

    AvailabilityRule:
      type: object
      required: [id, resourceId, dayOfWeek, startTime, endTime, ruleType, priority, status]
      properties:
        id: { type: string, format: uuid }
        resourceId: { type: string, format: uuid }
        availabilityProfileId: { type: string, format: uuid, nullable: true }
        dayOfWeek: { type: integer }
        startTime: { type: string }
        endTime: { type: string }
        effectiveFrom: { type: string, format: date, nullable: true }
        effectiveTo: { type: string, format: date, nullable: true }
        ruleType: { type: string, enum: [RegularWorkingHours, Shift, SeasonalSchedule, TemporarySchedule, AdditionalAvailability] }
        recurrencePattern:
          type: string
          nullable: true
          description: >-
            JSON-encoded { frequency: Daily|Weekly|SelectedWeekdays, interval, daysOfWeek[] }.
